
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="jordanRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CE1126"/>
      <stop offset="100%" style="stop-color:#8B0000"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#000000"/>
  
  <!-- Sole -->
  <path d="M80 400 L80 440 Q80 460 100 460 L420 460 Q450 460 450 430 L450 400 Q450 380 420 380 L100 380 Q80 380 80 400 Z" fill="#FFFFFF"/>
  
  <!-- Midsole -->
  <rect x="80" y="380" width="370" height="25" fill="#FFFFFF"/>
  
  <!-- Shoe body - main red part -->
  <path d="M90 380 L90 300 Q90 180 180 140 L380 100 Q430 85 450 130 L450 350 Q450 380 420 380 L90 380 Z" fill="url(#jordanRed)"/>
  
  <!-- Toe box - white -->
  <path d="M90 380 L90 320 Q90 280 120 270 L180 270 Q200 270 200 290 L200 380 L90 380 Z" fill="#FFFFFF"/>
  
  <!-- Mid panel - white -->
  <path d="M200 380 L200 300 Q200 220 260 190 L340 160 Q390 140 420 160 L420 320 Q420 380 380 380 L200 380 Z" fill="#FFFFFF"/>
  
  <!-- Wings logo area -->
  <ellipse cx="320" cy="200" rx="55" ry="40" fill="#FFFFFF"/>
  
  <!-- Wings logo detail -->
  <path d="M290 180 L340 155 L355 185 L315 200 Z" fill="#CE1126"/>
  <path d="M340 180 L355 205 L330 220 L315 195 Z" fill="#000000"/>
  
  <!-- Swoosh -->
  <path d="M100 320 Q160 270 240 240 Q320 210 390 180 Q410 172 420 190 Q430 215 380 260 Q300 320 200 360 Q140 385 100 350 Z" fill="#000000"/>
  
  <!-- Laces area -->
  <path d="M230 210 L360 160 Q380 152 390 170 L380 185 Q350 200 280 230 Z" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Laces -->
  <line x1="240" y1="215" x2="350" y2="170" stroke="#000000" stroke-width="5" stroke-linecap="round"/>
  <line x1="250" y1="230" x2="340" y2="190" stroke="#000000" stroke-width="5" stroke-linecap="round"/>
  <line x1="260" y1="245" x2="330" y2="210" stroke="#000000" stroke-width="5" stroke-linecap="round"/>
  <line x1="270" y1="260" x2="320" y2="230" stroke="#000000" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Ankle collar -->
  <path d="M380 100 Q450 80 460 150 L450 180 Q420 130 380 150 Z" fill="#FFFFFF"/>
  
  <!-- Air unit visible in sole -->
  <ellipse cx="260" cy="420" rx="50" ry="10" fill="#CE1126"/>
  <ellipse cx="260" cy="420" rx="35" ry="6" fill="#8B0000"/>
</svg>

